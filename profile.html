<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강명구 · 닥터팔레트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    .profile-page {
      min-height: 100vh;
      background: linear-gradient(165deg, #e8f4f8 0%, #f5eef8 40%, #f0f4e8 100%);
      color: #2d2d3a;
      font-family: "Noto Sans KR", sans-serif;
      padding: 2rem 1.5rem 4rem;
    }
    .profile-wrap {
      max-width: 520px;
      margin: 0 auto;
    }
    .profile-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .profile-avatar {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8e0f0, #e0e8f0);
      border: 3px solid rgba(200,180,220,0.5);
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #9a9ab0;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }
    .profile-avatar-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #9a9ab0;
    }
    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
      color: #2d2d3a;
    }
    .profile-role {
      font-size: 0.95rem;
      color: #5a5a72;
      font-weight: 500;
    }
    .profile-bio {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #4a4a5e;
      text-align: center;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }
    .profile-links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .profile-link {
      display: block;
      padding: 1rem 1.25rem;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(200,180,220,0.4);
      border-radius: 14px;
      color: #2d2d3a;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s;
      text-align: center;
    }
    .profile-link:hover {
      background: rgba(255,255,255,0.98);
      border-color: rgba(180,160,200,0.6);
    }
    .profile-link.primary {
      background: linear-gradient(135deg, #8b7cb0, #9a8bc4);
      border: none;
      color: #fff;
    }
    .profile-link.primary:hover {
      opacity: 0.92;
    }
    .profile-section {
      margin-top: 2.5rem;
    }
    .profile-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a7a8e;
      margin-bottom: 1rem;
      padding-left: 0.25rem;
    }
    .profile-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .profile-tag {
      padding: 0.5rem 0.9rem;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(200,180,220,0.35);
      border-radius: 999px;
      font-size: 0.85rem;
      color: #5a5a72;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #6a6a7e;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .back-link:hover {
      color: #3d3d4a;
    }
  </style>
</head>
<body class="profile-page">
  <div class="profile-wrap">
    <a href="index.html" class="back-link">← 명함으로 돌아가기</a>

    <header class="profile-header">
      <div class="profile-avatar">
        <img id="profilePhoto" src="image/profile.jpg" alt="강명구" onerror="this.style.display='none'">
        <span class="profile-avatar-fallback">👤</span>
      </div>
      <h1 class="profile-name">강명구</h1>
      <p class="profile-role">책임 · 원장님과 같이 성장을 함께합니다.</p>
    </header>

    <p class="profile-bio">
      병원 클라우드 전자차트(EMR&amp;CRM) <strong>닥터팔레트</strong> 입니다.<br>
      병원 운영에 효율성과 안정성을 가지고 운영해 보실 수 있습니다.
    </p>

    <nav class="profile-links">
      <a href="https://dr.pltt.cloud/plttnews" class="profile-link primary" target="_blank" rel="noopener">닥터팔레트 소식</a>
      <a href="https://weavrlog.care/timeline/products/drpalette" class="profile-link" target="_blank" rel="noopener">위버로그 블로그</a>
      <a href="mailto:jacob.kang@medibloc.org" class="profile-link">이메일 문의</a>
      <a href="tel:010-8793-7767" class="profile-link">연락처 010-8793-7767</a>
    </nav>

    <section class="profile-section">
      <h2 class="profile-section-title">키워드</h2>
      <div class="profile-tags">
        <span class="profile-tag">#10년차 영업</span>
        <span class="profile-tag">#병의원 차트</span>
        <span class="profile-tag">#마케팅</span>
      </div>
    </section>
  </div>
  <script>
    (function(){
      var el = document.getElementById('profilePhoto');
      if (!el) return;
      var base = (location.href || '').replace(/[^/]+$/, '') || '';
      var tries = ['image/profile.jpg','image/profile.png','image/profile.jpeg','이미지/profile.jpg','이미지/profile.png','./image/profile.jpg','./이미지/profile.jpg'];
      var idx = 0;
      el.onerror = function(){
        idx++;
        if (idx < tries.length) { el.src = tries[idx]; el.style.display = ''; }
        else if (base) { el.src = base + 'image/profile.jpg'; el.style.display = ''; }
      };
    })();
  </script>
</body>
</html>
